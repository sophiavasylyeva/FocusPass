
name: focuspass
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  # Screen time management dependencies
  installed_apps: ^1.3.7  # Cross-platform app info
  # usage_stats removed - using native method channel instead
  flutter_background_service: ^5.0.5
  shared_preferences: ^2.2.2
  permission_handler: ^12.0.1
  intl: ^0.20.2
  flutter_local_notifications: ^19.3.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
